<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>AllDev</title>
</head>
<body>
    <header class="cabecalho">
        <img class="cabecalho__logo" src="assets/logo.svg" alt="Logo AllDev">
        <input type="search" class="barra_pesquisa" placeholder="Busque por algo">
        <div class="cabecalho__usuario">
            <img class="cabecalho__perfil" src="assets/Photo.svg" alt="Foto de perfil do usuário">
            <p>Lucas</p>
        </div>
    </header>

    <main class="principal">

        <section class="menu">
            <h3 class="menu__titulo">Menu</h3>
            <ul class="menu__lista">
                <li class="menu__item">
                    <img src="assets/icone-editor.svg" alt="Icone de editor de código">
                    <a class= "item__link" href="#">Editor de código</a>
                </li>
                <li class="menu__item">
                    <img src="assets/icone-comunidade.svg" alt="Icone da comunidade">
                    <a class="item__link" href="#">Comunidade</a>
                </li>
            </ul>
        </section>

        <section class="codigo">
            <div class="codigo__bola">
                <img src="assets/Ellipse 1.svg">
                <img src="assets/Ellipse 2.svg">
                <img src="assets/Ellipse 3.svg">
            </div>
            <textarea class="input__codigo" cols="30" rows="10"></textarea>
            <button class="botao__highlight">Vizualizar com highlight</button>
        </section>

        <section class="dados">
            <h3 class="dados__titulo">Seu Projeto</h3>
            <input type="text" class="barra_pesquisa dados__nome" placeholder="Nome do seu projeto">
            <input type="text" class="barra_pesquisa dados__descricao" placeholder="Descrição do seu projeto">

            <h3 class="dados__titulo">Personalização</h3>
            <select name="linguagem" class="barra_pesquisa dados__linguagem" >
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
            </select>
            <input type="color" value="#6BD1FF" class="dados__cor">
            <button class="dados__botao" type="submit">Salvar Projeto</button>
        </section>
    </main>
</body>
</html>
